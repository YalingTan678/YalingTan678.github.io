<aside class="lily-guide" data-lily-guide aria-label="Meet Lily">
  <section class="lily-guide__bubble" data-lily-bubble aria-live="polite">
    <button class="lily-guide__close" type="button" data-lily-close aria-label="Close Lily's message" title="Close">
      &times;
    </button>

    <div data-lily-step="hello">
      <p class="lily-guide__eyebrow">A note from Lily</p>
      <p class="lily-guide__message">Hi, I’m Lily. How are you today?</p>
      <div class="lily-guide__choices">
        <button type="button" data-lily-mood="well">Doing well</button>
        <button type="button" data-lily-mood="busy">A little busy</button>
      </div>
    </div>

    <div data-lily-step="explore" hidden>
      <p class="lily-guide__eyebrow" data-lily-reply>Lovely to meet you.</p>
      <p class="lily-guide__message">What would you like to know about me?</p>
      <nav class="lily-guide__links" aria-label="Explore Lily's website">
        <a href="#research-strands">Research</a>
        <a href="#methodology">How I work</a>
        <a href="#journey">My journey</a>
        <a href="{{ base_path }}/cv/">CV</a>
      </nav>
    </div>
  </section>

  <button class="lily-guide__mascot" type="button" data-lily-mascot aria-label="Open Lily's welcome message">
    <img src="{{ base_path }}/images/illustrations/lily-guide.png" alt="Illustration of Lily giving a talk at a microphone">
  </button>
</aside>

<style>
  .lily-guide {
    --lily-ink: #182830;
    --lily-pink: #e83068;
    --lily-teal: #084860;
    --lily-cream: #f8f0e8;
    position: fixed;
    right: clamp(0.75rem, 2.2vw, 2rem);
    bottom: 0.5rem;
    z-index: 150;
    display: grid;
    grid-template-columns: minmax(240px, 300px) 150px;
    align-items: end;
    gap: 0;
    pointer-events: none;
  }

  .lily-guide__bubble {
    position: relative;
    align-self: center;
    margin: 0 0 4.8rem;
    padding: 1rem 1rem 0.9rem;
    color: var(--lily-ink);
    background: #fffdf9;
    border: 1px solid #d8d0c0;
    border-radius: 12px;
    box-shadow: 0 12px 28px rgba(24, 40, 48, 0.14);
    pointer-events: auto;
    transform-origin: bottom right;
    animation: lily-bubble-in 0.45s 0.65s ease both;
  }

  .lily-guide__bubble::after {
    content: "";
    position: absolute;
    right: -9px;
    bottom: 30px;
    width: 16px;
    height: 16px;
    background: #fffdf9;
    border-top: 1px solid #d8d0c0;
    border-right: 1px solid #d8d0c0;
    transform: rotate(45deg);
  }

  .lily-guide__bubble[hidden] {
    display: none;
  }

  .lily-guide__close {
    position: absolute;
    top: 0.3rem;
    right: 0.45rem;
    width: 1.75rem;
    height: 1.75rem;
    padding: 0;
    border: 0;
    background: transparent;
    color: #68747a;
    font: inherit;
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
  }

  .lily-guide__close:hover,
  .lily-guide__close:focus-visible {
    color: var(--lily-pink);
  }

  .lily-guide__eyebrow {
    margin: 0 1.5rem 0.25rem 0;
    color: var(--lily-teal);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .lily-guide__message {
    margin: 0;
    color: var(--lily-ink);
    font-size: 0.92rem;
    font-weight: 650;
    line-height: 1.45;
  }

  .lily-guide__choices,
  .lily-guide__links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-top: 0.75rem;
  }

  .lily-guide__choices button,
  .lily-guide__links a {
    min-height: 2rem;
    padding: 0.38rem 0.65rem;
    border: 1px solid #d8d0c0;
    border-radius: 6px;
    background: var(--lily-cream);
    color: var(--lily-ink);
    font: inherit;
    font-size: 0.74rem;
    font-weight: 650;
    line-height: 1.2;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }

  .lily-guide__choices button:hover,
  .lily-guide__choices button:focus-visible,
  .lily-guide__links a:hover,
  .lily-guide__links a:focus-visible {
    border-color: var(--lily-pink);
    color: var(--lily-pink);
    transform: translateY(-1px);
  }

  .lily-guide__mascot {
    width: 150px;
    height: 220px;
    padding: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    pointer-events: auto;
    transform-origin: bottom center;
    animation: lily-arrive 0.8s 0.1s cubic-bezier(0.2, 0.8, 0.2, 1.2) both,
      lily-float 3.4s 1.1s ease-in-out infinite;
  }

  .lily-guide__mascot img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    filter: drop-shadow(0 8px 8px rgba(24, 40, 48, 0.14));
  }

  .lily-guide__mascot:hover img {
    filter: drop-shadow(0 10px 10px rgba(24, 40, 48, 0.2));
  }

  @keyframes lily-arrive {
    0% { opacity: 0; transform: translateY(110%) scale(0.84); }
    68% { opacity: 1; transform: translateY(-8%) scale(1.03); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes lily-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  @keyframes lily-bubble-in {
    from { opacity: 0; transform: translateY(8px) scale(0.94); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 700px) {
    .lily-guide {
      right: 0.35rem;
      bottom: 0.15rem;
      grid-template-columns: minmax(205px, 250px) 104px;
    }

    .lily-guide__bubble {
      margin-bottom: 3.8rem;
      padding: 0.85rem;
    }

    .lily-guide__mascot {
      width: 104px;
      height: 158px;
    }

    .lily-guide__message {
      font-size: 0.84rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .lily-guide__bubble,
    .lily-guide__mascot {
      animation: none;
    }

    .lily-guide__choices button,
    .lily-guide__links a {
      transition: none;
    }
  }
</style>

<script>
  (function () {
    var guide = document.querySelector("[data-lily-guide]");
    if (!guide) return;

    var bubble = guide.querySelector("[data-lily-bubble]");
    var mascot = guide.querySelector("[data-lily-mascot]");
    var close = guide.querySelector("[data-lily-close]");
    var hello = guide.querySelector('[data-lily-step="hello"]');
    var explore = guide.querySelector('[data-lily-step="explore"]');
    var reply = guide.querySelector("[data-lily-reply]");

    function openBubble() {
      bubble.hidden = false;
      mascot.setAttribute("aria-expanded", "true");
    }

    function closeBubble() {
      bubble.hidden = true;
      mascot.setAttribute("aria-expanded", "false");
    }

    guide.querySelectorAll("[data-lily-mood]").forEach(function (button) {
      button.addEventListener("click", function () {
        var isBusy = button.getAttribute("data-lily-mood") === "busy";
        reply.textContent = isBusy
          ? "I hope this can be a calm little stop."
          : "I’m glad you’re here.";
        hello.hidden = true;
        explore.hidden = false;
      });
    });

    mascot.addEventListener("click", function () {
      if (bubble.hidden) {
        openBubble();
      } else {
        closeBubble();
      }
    });

    close.addEventListener("click", closeBubble);

    guide.querySelectorAll('a[href^="#"]').forEach(function (link) {
      link.addEventListener("click", closeBubble);
    });

    mascot.setAttribute("aria-expanded", "true");
  })();
</script>
