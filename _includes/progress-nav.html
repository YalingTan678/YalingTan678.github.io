<style>
.progress-nav {
  position: fixed;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 8px 0;
}
.progress-nav::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 1.5px;
  background: #e2e8f0;
  border-radius: 1px;
  transform: translateX(-50%);
}
.progress-nav__dot {
  position: relative;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #cbd5e1;
  border: none;
  padding: 0;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 1;
  text-decoration: none;
  margin: 10px 0;
  flex-shrink: 0;
}
.progress-nav__dot:hover {
  background: #9F50D3;
  transform: scale(1.6);
}
.progress-nav__dot.active {
  background: #9F50D3;
  transform: scale(1.5);
  box-shadow: 0 0 6px rgba(159,80,211,0.4);
}
/* Tooltip */
.progress-nav__dot::after {
  content: attr(data-label);
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: #1e293b;
  color: #fff;
  font-size: 0.68rem;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 5px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.progress-nav__dot:hover::after {
  opacity: 1;
}
@media (max-width: 900px) {
  .progress-nav { display: none; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var headings = document.querySelectorAll('h2');
  if (headings.length < 2) return;

  var nav = document.createElement('nav');
  nav.className = 'progress-nav';
  nav.setAttribute('aria-label', 'Page sections');

  var dots = [];
  headings.forEach(function(h, i) {
    if (!h.id) {
      h.id = h.textContent.trim().toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fff]+/g, '-')
        .replace(/^-|-$/g, '') || 'section-' + i;
    }
    var dot = document.createElement('a');
    dot.className = 'progress-nav__dot';
    dot.href = '#' + h.id;
    dot.setAttribute('data-label', h.textContent.trim().substring(0, 30));
    dot.setAttribute('aria-label', h.textContent.trim());
    dot.addEventListener('click', function(e) {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nav.appendChild(dot);
    dots.push({ dot: dot, heading: h });
  });

  document.body.appendChild(nav);

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        dots.forEach(function(d) {
          d.dot.classList.toggle('active', d.heading === entry.target);
        });
      }
    });
  }, { rootMargin: '-15% 0px -75% 0px' });

  dots.forEach(function(d) { observer.observe(d.heading); });
});
</script>
