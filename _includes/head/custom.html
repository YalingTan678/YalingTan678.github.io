{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon: cursive L (SVG first for transparency + color adaptation) -->
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="apple-touch-icon" sizes="192x192" href="{{ base_path }}/images/favicon-192x192.png"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Publication visualization styles -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/pub-viz.css"/>

<!-- Layout override: flexbox sidebar + content (replaces Susy floats) -->
<style>
  @media screen and (min-width: 925px) {
    #main {
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 1.5rem;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }
    .sidebar {
      width: 200px !important;
      min-width: 200px !important;
      flex-shrink: 0 !important;
      float: none !important;
      position: sticky !important;
      top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }
    .sidebar::before, .sidebar::after {
      display: none !important;
    }
    article.page {
      flex: 1 !important;
      min-width: 0 !important;
      float: none !important;
      width: auto !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
    .page__related {
      float: none !important;
      margin-left: 0 !important;
    }
  }
  @media screen and (max-width: 924px) {
    #main {
      display: block !important;
    }
    .sidebar {
      width: 100% !important;
      position: relative !important;
      height: auto !important;
      overflow: visible !important;
    }
  }
  /* Masthead mesh gradient */
  @property --g1 { syntax: '<percentage>'; initial-value: 0%; inherits: false; }
  @property --g2 { syntax: '<percentage>'; initial-value: 100%; inherits: false; }
  @property --g3 { syntax: '<percentage>'; initial-value: 50%; inherits: false; }

  .masthead {
    background:
      radial-gradient(ellipse at var(--g1) 50%, #9E48A6cc 0%, transparent 50%),
      radial-gradient(ellipse at var(--g2) 30%, #B850A6bb 0%, transparent 55%),
      radial-gradient(ellipse at var(--g3) 80%, #B68AD2cc 0%, transparent 50%),
      radial-gradient(ellipse at 80% var(--g1), #BE9EDEbb 0%, transparent 55%),
      linear-gradient(135deg, #D2CCF2, #BE9EDE, #B68AD2, #B850A6, #9E48A6) !important;
    animation: meshFlow 8s ease-in-out infinite !important;
    border-bottom: none !important;
  }
  .masthead::after {
    display: none !important;
  }
  @keyframes meshFlow {
    0%   { --g1: 10%; --g2: 90%; --g3: 40%; }
    33%  { --g1: 60%; --g2: 30%; --g3: 80%; }
    66%  { --g1: 85%; --g2: 55%; --g3: 15%; }
    100% { --g1: 10%; --g2: 90%; --g3: 40%; }
  }
  .masthead .greedy-nav a,
  .masthead .greedy-nav button {
    color: #fff !important;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .masthead .greedy-nav a:hover {
    color: #f0e6ff !important;
  }
  .masthead__menu-item {
    background-color: transparent !important;
  }
  /* Theme toggle icon in masthead */
  #theme-toggle i {
    color: #fff !important;
  }

  /* Sidebar icon brand colors (fix specificity for single-layout pages) */
  .author__urls.social-icons .fa-envelope { color: #b91c1c !important; }
  .author__urls.social-icons .fa-location-dot { color: #16a34a !important; }
  .author__urls.social-icons .ai-google-scholar { color: #4285f4 !important; }
  .author__urls.social-icons .ai-orcid { color: #a6ce39 !important; }
  .author__urls.social-icons .fa-researchgate { color: #00ccbb !important; }
  .author__urls.social-icons .fa-linkedin { color: #0077b5 !important; }
</style>

<!-- end custom head snippets -->
