{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon: cursive L (SVG first for transparency + color adaptation) -->
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="apple-touch-icon" sizes="192x192" href="{{ base_path }}/images/favicon-192x192.png"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Publication visualization styles -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/pub-viz.css"/>

<!-- Layout override: flexbox sidebar + content (replaces Susy floats) -->
<style>
  @media screen and (min-width: 925px) {
    #main {
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 1.5rem;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }
    .sidebar {
      width: 200px !important;
      min-width: 200px !important;
      flex-shrink: 0 !important;
      float: none !important;
      position: sticky !important;
      top: 70px;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }
    .sidebar::before, .sidebar::after {
      display: none !important;
    }
    article.page {
      flex: 1 !important;
      min-width: 0 !important;
      float: none !important;
      width: auto !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
    .page__related {
      float: none !important;
      margin-left: 0 !important;
    }
  }
  @media screen and (max-width: 924px) {
    #main {
      display: block !important;
    }
    .sidebar {
      width: 100% !important;
      position: relative !important;
      height: auto !important;
      overflow: visible !important;
    }
  }
  /* Masthead mesh gradient */
  @property --m1 { syntax: '<percentage>'; initial-value: 10%; inherits: false; }
  @property --m2 { syntax: '<percentage>'; initial-value: 90%; inherits: false; }
  @property --m3 { syntax: '<percentage>'; initial-value: 50%; inherits: false; }
  @property --m4 { syntax: '<percentage>'; initial-value: 30%; inherits: false; }
  @property --m5 { syntax: '<percentage>'; initial-value: 70%; inherits: false; }

  .masthead {
    background:
      radial-gradient(circle at var(--m1) 20%, #241D9Aee 0%, transparent 40%),
      radial-gradient(circle at var(--m2) 80%, #F75092dd 0%, transparent 45%),
      radial-gradient(ellipse at var(--m3) 50%, #9F50D3cc 0%, transparent 50%),
      radial-gradient(circle at var(--m4) 70%, #F75092bb 0%, transparent 35%),
      radial-gradient(ellipse at var(--m5) 30%, #241D9Abb 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #9F50D3aa 0%, transparent 60%),
      linear-gradient(120deg, #241D9A, #9F50D3, #F75092, #E0EAFF, #9F50D3, #241D9A) !important;
    animation: meshFlow 15s ease-in-out infinite !important;
    border-bottom: none !important;
  }
  .masthead::after {
    display: none !important;
  }
  @keyframes meshFlow {
    0%   { --m1: 5%;  --m2: 95%; --m3: 40%; --m4: 20%; --m5: 75%; }
    20%  { --m1: 35%; --m2: 65%; --m3: 70%; --m4: 50%; --m5: 15%; }
    40%  { --m1: 70%; --m2: 25%; --m3: 15%; --m4: 80%; --m5: 45%; }
    60%  { --m1: 90%; --m2: 45%; --m3: 60%; --m4: 10%; --m5: 85%; }
    80%  { --m1: 50%; --m2: 80%; --m3: 25%; --m4: 65%; --m5: 30%; }
    100% { --m1: 5%;  --m2: 95%; --m3: 40%; --m4: 20%; --m5: 75%; }
  }
  .masthead .greedy-nav a,
  .masthead .greedy-nav button {
    color: #fff !important;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .masthead .greedy-nav a:hover {
    color: #f0e6ff !important;
  }
  .masthead__menu-item {
    background-color: transparent !important;
  }
  .masthead__inner-wrap {
    max-width: 1400px !important;
    padding: 0.5em 3rem !important;
  }
  .masthead .greedy-nav {
    background: transparent !important;
  }
  .masthead .greedy-nav .visible-links li {
    background: transparent !important;
  }
  .masthead .hidden-links {
    background: rgba(80, 30, 140, 0.95) !important;
    border: none !important;
  }
  .masthead .hidden-links li {
    background: transparent !important;
  }
  /* Theme toggle icon in masthead */
  #theme-toggle i {
    color: #fff !important;
  }

  /* Sidebar icon brand colors (fix specificity for single-layout pages) */
  .author__urls.social-icons .fa-envelope { color: #b91c1c !important; }
  .author__urls.social-icons .fa-location-dot { color: #16a34a !important; }
  .author__urls.social-icons .ai-google-scholar { color: #4285f4 !important; }
  .author__urls.social-icons .ai-orcid { color: #a6ce39 !important; }
  .author__urls.social-icons .fa-researchgate { color: #00ccbb !important; }
  .author__urls.social-icons .fa-linkedin { color: #0077b5 !important; }

  /* Dark mode fixes for Service page and all inline-styled pages */
  [data-theme="dark"] .svc-content,
  [data-theme="dark"] .teach-content,
  [data-theme="dark"] .pub-page,
  [data-theme="dark"] .talk-page {
    color: #e2e8f0 !important;
  }
  [data-theme="dark"] .svc-content h2,
  [data-theme="dark"] .teach-content h2,
  [data-theme="dark"] .pub-page h2 {
    color: #93c5fd !important;
    border-bottom-color: #334155 !important;
  }
  [data-theme="dark"] .philosophy,
  [data-theme="dark"] .research-stmt {
    background: linear-gradient(135deg, #1e1b4b 0%, #1a1a3e 40%, #2d1b3d 100%) !important;
    color: #e2e8f0 !important;
    border-color: rgba(139,92,246,0.2) !important;
  }
  [data-theme="dark"] .svc-card,
  [data-theme="dark"] .teach-card,
  [data-theme="dark"] .pub-card {
    background: #1e293b !important;
    border-color: #334155 !important;
    color: #e2e8f0 !important;
  }
  [data-theme="dark"] .svc-card__org,
  [data-theme="dark"] .teach-card__org,
  [data-theme="dark"] .pub-card__title {
    color: #f1f5f9 !important;
  }
  [data-theme="dark"] .svc-card__desc li,
  [data-theme="dark"] .teach-card__desc li,
  [data-theme="dark"] .pub-card__excerpt {
    color: #cbd5e1 !important;
  }
  [data-theme="dark"] .svc-card__meta,
  [data-theme="dark"] .teach-card__meta,
  [data-theme="dark"] .pub-card__authors,
  [data-theme="dark"] .pub-card__venue {
    color: #94a3b8 !important;
  }
  [data-theme="dark"] .award-item {
    border-bottom-color: #334155 !important;
    color: #e2e8f0 !important;
  }
  [data-theme="dark"] .award-amount {
    background: #064e3b !important;
    color: #34d399 !important;
  }
</style>

<!-- end custom head snippets -->
