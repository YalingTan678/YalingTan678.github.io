name: Update Google Scholar Stats

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Fetch Google Scholar stats
      run: python scripts/update_scholar.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add _data/scholar.json
        git commit -m "chore: update Google Scholar stats" || echo "No changes to commit"
        git push
