<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Life | Lily Tan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;overflow-x:hidden;font-family:'Inter',system-ui,sans-serif;background:#faf8ff;color:#1e1b4b}
    body.detail-active{overflow-y:auto}
    body:not(.detail-active){overflow-y:hidden;height:100vh}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.15);border-radius:3px}

    .film-grain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;pointer-events:none;opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px 128px}

    /* ====== TOP NAV ====== */
    .life-nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
      padding:0 2rem;height:54px;background:rgba(250,248,255,0.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(124,58,237,0.06)}
    .life-nav__logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#1e1b4b;text-decoration:none}
    .life-nav__logo:hover{color:#7c3aed}
    .life-nav__links{display:flex;gap:1.6rem;list-style:none}
    .life-nav__links a{font-size:0.78rem;font-weight:500;color:rgba(30,27,75,0.5);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s}
    .life-nav__links a:hover,.life-nav__links a.active{color:#7c3aed}

    /* ====== BG PARTICLES ====== */
    #bgParticles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
    .bg-dot{position:absolute;border-radius:50%;pointer-events:none;animation:floatDot linear infinite}
    @keyframes floatDot{0%{transform:translate(0,0) scale(1);opacity:0}8%{opacity:var(--dot-opacity,0.2)}88%{opacity:var(--dot-opacity,0.2)}100%{transform:translate(var(--dx),var(--dy)) scale(0.5);opacity:0}}

    #flashOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:15;pointer-events:none;opacity:0}

    /* ====== LAYER 1: Card Gallery ====== */
    #layer1{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #layer1 .title-text{position:absolute;top:70px;left:50%;transform:translateX(-50%);text-align:center;z-index:12;pointer-events:none}
    #layer1 .title-text h1{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,2.2vw,1.8rem);font-weight:400;color:rgba(30,27,75,0.5);letter-spacing:0.05em}
    #layer1 .title-text p{font-size:0.65rem;color:rgba(30,27,75,0.22);margin-top:0.25rem;letter-spacing:0.15em;text-transform:uppercase}

    .gallery-wrap{width:100%;height:100%;perspective:1200px;perspective-origin:50% 50%}
    .gallery-stage{width:100%;height:100%;position:relative}

    .gcard{position:absolute;left:50%;top:50%;border-radius:12px;overflow:hidden;will-change:transform,opacity;backface-visibility:hidden;
      border:1px solid rgba(255,255,255,0.4);box-shadow:0 2px 8px rgba(30,27,75,0.08),0 25px 70px rgba(30,27,75,0.12);
      transition:box-shadow 0.45s ease,filter 0.45s ease}
    .gcard--main{cursor:pointer}
    .gcard--main.hovered{box-shadow:0 4px 12px rgba(124,58,237,0.15),0 40px 100px rgba(124,58,237,0.2),0 0 40px rgba(247,80,146,0.08)}
    .gcard__img{width:100%;height:100%;background-size:cover;background-position:center;position:absolute;top:0;left:0;filter:contrast(1.04) saturate(1.1)}
    .gcard::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 40%,transparent 60%,rgba(255,255,255,0.05) 100%);pointer-events:none;z-index:2}
    .gcard__overlay{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 1.2rem;z-index:3;background:linear-gradient(transparent 0%,rgba(0,0,0,0.55) 100%);display:flex;flex-direction:column;gap:0.25rem}
    .gcard__label{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.3)}
    .gcard__explore{font-size:0.65rem;font-weight:500;color:rgba(255,255,255,0.6);letter-spacing:0.12em;text-transform:uppercase;opacity:0;transform:translateY(6px);transition:opacity 0.35s,transform 0.35s}
    .gcard--main.hovered .gcard__explore{opacity:1;transform:translateY(0)}

    /* ====== LAYER 2: Photo Masonry Gallery ====== */
    #layer2{display:none;position:relative;z-index:10;min-height:100vh;background:#faf8ff}

    .back-btn{position:fixed;top:2rem;left:2rem;z-index:100;background:rgba(250,248,255,0.8);border:1px solid rgba(124,58,237,0.15);
      color:rgba(30,27,75,0.6);padding:0.5rem 1.2rem;border-radius:30px;font-size:0.75rem;font-family:'Inter',sans-serif;
      letter-spacing:0.1em;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all 0.3s;display:none}
    .back-btn:hover{background:rgba(124,58,237,0.1);color:#1e1b4b}

    /* Masonry grid */
    .masonry{columns:4;column-gap:12px;padding:80px 2rem 3rem;max-width:1400px;margin:0 auto}
    .masonry .mphoto{break-inside:avoid;margin-bottom:12px;border-radius:12px;overflow:hidden;position:relative;
      opacity:0;transform:translateY(40px) scale(0.95);transition:transform 0.4s ease,box-shadow 0.4s ease}
    .masonry .mphoto.vis{opacity:1;transform:translateY(0) scale(1)}
    .masonry .mphoto:hover{transform:scale(1.03);box-shadow:0 20px 60px rgba(124,58,237,0.15);z-index:5}
    .masonry .mphoto .ph{width:100%;display:block;border-radius:12px}

    @media(max-width:1100px){.masonry{columns:3}}
    @media(max-width:768px){
      .masonry{columns:2;padding:70px 1rem 2rem}
      .life-nav{padding:0 1rem;height:48px}
      .life-nav__links{gap:1rem}
      .life-nav__links a{font-size:0.7rem}
      .back-btn{top:1rem;left:1rem;padding:0.4rem 0.8rem;font-size:0.65rem}
      #layer1 .title-text{top:58px}
    }
    @media(max-width:480px){.masonry{columns:1}}
  </style>
</head>
<body>

  <nav class="life-nav">
    <a href="/" class="life-nav__logo">Lily Tan</a>
    <ul class="life-nav__links">
      <li><a href="/">Home</a></li>
      <li><a href="/publications/">Research</a></li>
      <li><a href="/teaching/">Teaching</a></li>
      <li><a href="/service/">Service</a></li>
      <li><a href="/cv/">CV</a></li>
      <li><a href="/life/" class="active">Life</a></li>
    </ul>
  </nav>

  <div class="film-grain"></div>
  <div id="bgParticles"></div>
  <div id="flashOverlay"></div>

  <!-- LAYER 1: 3D Card Gallery -->
  <div id="layer1">
    <div class="gallery-wrap" id="galleryWrapper">
      <div class="gallery-stage" id="galleryStage"></div>
    </div>
    <div class="title-text">
      <h1>Beyond the Research</h1>
      <p>Click a card to explore</p>
    </div>
  </div>

  <!-- LAYER 2: Photo Masonry -->
  <div id="layer2"></div>
  <button class="back-btn" id="backBtn">&larr; Back</button>

<script>
(function(){

gsap.registerPlugin(ScrollTrigger);

/* ====== PHOTO DATA (placeholder gradients — replace with real photos later) ====== */
var PHOTOS = {
  pet: [
    {img:'/images/life/pet/1.jpg'},{img:'/images/life/pet/2.jpg'},{img:'/images/life/pet/3.jpg'},
    {img:'/images/life/pet/4.jpg'},{img:'/images/life/pet/5.jpg'},{img:'/images/life/pet/7.jpg'},
    {img:'/images/life/pet/8.jpg'},{img:'/images/life/pet/9.jpg'},
    {img:'/images/life/pet/10.jpg'},{img:'/images/life/pet/11.jpg'},{img:'/images/life/pet/12.jpg'},{img:'/images/life/pet/13.jpg'}
  ],
  florist: [
    {h:340,c:['#86efac','#7c3aed']},{h:260,c:['#fbbf24','#f75092']},{h:300,c:['#a78bfa','#34d399']},
    {h:380,c:['#f472b6','#60a5fa']},{h:220,c:['#c084fc','#fbbf24']},{h:320,c:['#34d399','#8b5cf6']},
    {h:280,c:['#f9a8d4','#86efac']},{h:350,c:['#fbbf24','#c084fc']},{h:240,c:['#60a5fa','#f472b6']},
    {h:290,c:['#7c3aed','#86efac']},{h:360,c:['#f75092','#fbbf24']},{h:230,c:['#34d399','#a78bfa']},
    {h:310,c:['#c084fc','#86efac']},{h:270,c:['#fbbf24','#7c3aed']},{h:340,c:['#f472b6','#34d399']}
  ],
  travel: [
    {h:300,c:['#60a5fa','#f75092']},{h:360,c:['#fbbf24','#7c3aed']},{h:240,c:['#34d399','#60a5fa']},
    {h:280,c:['#f472b6','#fbbf24']},{h:340,c:['#7c3aed','#34d399']},{h:220,c:['#60a5fa','#f472b6']},
    {h:380,c:['#fbbf24','#60a5fa']},{h:260,c:['#34d399','#f75092']},{h:310,c:['#a78bfa','#fbbf24']},
    {h:290,c:['#60a5fa','#34d399']},{h:350,c:['#f75092','#60a5fa']},{h:230,c:['#7c3aed','#fbbf24']},
    {h:270,c:['#34d399','#a78bfa']},{h:320,c:['#fbbf24','#f472b6']},{h:250,c:['#60a5fa','#7c3aed']}
  ]
};

/* ====== GALLERY CARDS ====== */
var CARD_RY = -25, CARD_RX = 8, CARD_W = 280, CARD_H = 380;
var ALL_CARDS = [
  { type:'main', key:'pet',     label:'Pet Lover', img:'/images/life/pet.jpg',     x:-300, y:160,  z:100,  ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H },
  { type:'main', key:'florist', label:'Florist',   img:'/images/life/florist.jpg', x:0,    y:0,    z:-50,  ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H },
  { type:'main', key:'travel',  label:'Travel',    img:'/images/life/travel.jpg',  x:300,  y:-160, z:-200, ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H }
];

/* ====== GLOBALS ====== */
var layer1 = document.getElementById('layer1');
var layer2 = document.getElementById('layer2');
var backBtn = document.getElementById('backBtn');
var galleryStage = document.getElementById('galleryStage');
var flashOverlay = document.getElementById('flashOverlay');

var currentLayer = 1;
var galleryAnimId;
var activeTheme = null;
var transitioning = false;
var cardElements = [];

var targetMouseX = 0, targetMouseY = 0, smoothMouseX = 0, smoothMouseY = 0;
var isMobile = window.innerWidth < 768;
var galleryScale = isMobile ? 0.5 : 1;

/* ====== BUILD CARD GALLERY ====== */
function buildGallery() {
  galleryStage.innerHTML = '';
  cardElements = [];

  ALL_CARDS.forEach(function(d, i) {
    var card = document.createElement('div');
    card.className = 'gcard gcard--main';
    card.dataset.z = d.z;
    card.dataset.idx = i;
    card.dataset.key = d.key;
    card.style.width = (d.w * galleryScale) + 'px';
    card.style.height = (d.h * galleryScale) + 'px';

    card.innerHTML =
      '<div class="gcard__img" style="background-image:url(\'' + d.img + '\')"></div>' +
      '<div class="gcard__overlay"><span class="gcard__label">' + d.label + '</span><span class="gcard__explore">Explore \u2192</span></div>';

    (function(el, data) {
      el.addEventListener('click', function() {
        if (transitioning || currentLayer !== 1) return;
        transitionToDetail(el);
      });
      el.addEventListener('mouseenter', function() {
        if (transitioning) return;
        el.classList.add('hovered');
        gsap.to(el, { scale: 1.06, z: data.z + 60, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
        cardElements.forEach(function(c) {
          if (c !== el) gsap.to(c, { filter: 'blur(4px)', scale: 0.92, opacity: 0.5, duration: 0.4, overwrite: 'auto' });
        });
      });
      el.addEventListener('mouseleave', function() {
        el.classList.remove('hovered');
        gsap.to(el, { scale: 1, z: data.z, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
        cardElements.forEach(function(c) {
          if (c !== el) gsap.to(c, { filter: 'none', scale: 1, opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
        });
      });
    })(card, d);

    gsap.set(card, {
      xPercent: -50, yPercent: -50,
      x: d.x * galleryScale, y: d.y * galleryScale, z: d.z,
      rotateX: d.rx, rotateY: d.ry, transformPerspective: 1200,
      opacity: 0, scale: 0.5
    });

    galleryStage.appendChild(card);
    cardElements.push(card);
  });
}

/* ====== ZOOM BURST ENTRANCE ====== */
function playGalleryEntrance() {
  var titleText = layer1.querySelector('.title-text');
  gsap.set(titleText, { opacity: 0, y: 15 });
  cardElements.forEach(function(c) { gsap.set(c, { x: 0, y: 0, z: 0, scale: 0.1, opacity: 0 }); });

  var tl = gsap.timeline();
  cardElements.forEach(function(c, i) {
    var d = ALL_CARDS[parseInt(c.dataset.idx)];
    tl.to(c, { x: d.x * galleryScale, y: d.y * galleryScale, z: d.z, scale: 1, opacity: 1, duration: 0.9, ease: 'back.out(1.3)' }, 0.3 + i * 0.06);
  });
  tl.to(titleText, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, 1.2);
}

/* ====== MOUSE PARALLAX ====== */
window.addEventListener('mousemove', function(e) {
  targetMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  targetMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function galleryLoop() {
  galleryAnimId = requestAnimationFrame(galleryLoop);
  if (currentLayer !== 1) return;
  if (!transitioning) {
    smoothMouseX += (targetMouseX - smoothMouseX) * 0.04;
    smoothMouseY += (targetMouseY - smoothMouseY) * 0.04;
    galleryStage.style.transform = 'rotateY(' + (smoothMouseX * 2) + 'deg) rotateX(' + (-smoothMouseY * 1.5) + 'deg)';
  }
}

/* ====== TRANSITION: CARDS → DETAIL ====== */
function transitionToDetail(mainCardEl) {
  transitioning = true;
  activeTheme = mainCardEl.dataset.key;
  gsap.killTweensOf('.gcard');

  var tl = gsap.timeline({
    onComplete: function() { showDetailLayer(); transitioning = false; }
  });

  tl.to('#layer1 .title-text', { opacity: 0, y: -15, duration: 0.3, ease: 'power2.in' }, 0);
  cardElements.forEach(function(c) {
    if (c === mainCardEl) return;
    tl.to(c, { z: '-=400', opacity: 0, filter: 'blur(8px)', duration: 0.8, ease: 'power2.in' }, 0);
  });
  tl.to(galleryStage, { rotateY: 0, rotateX: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, 0);
  tl.to(mainCardEl, { z: '+=200', duration: 0.25, ease: 'power2.out' }, 0);
  tl.to(mainCardEl, { x: 0, y: 0, z: 500, rotateX: 0, rotateY: 0, rotation: 0, duration: 0.7, ease: 'power2.inOut' }, 0.2);
  var rect = mainCardEl.getBoundingClientRect();
  var scaleToFill = Math.max(window.innerWidth / Math.max(rect.width, 1), window.innerHeight / Math.max(rect.height, 1)) * 1.3;
  tl.to(mainCardEl, { scale: scaleToFill, duration: 0.45, ease: 'power2.in' }, 0.7);
  tl.to(mainCardEl, { opacity: 0, duration: 0.2 }, 1.0);
  tl.to(flashOverlay, { opacity: 1, duration: 0.25, ease: 'power1.in' }, 0.95);
}

/* ====== SHOW MASONRY PHOTO GALLERY ====== */
function showDetailLayer() {
  currentLayer = 2;
  cancelAnimationFrame(galleryAnimId);

  layer1.style.display = 'none';
  layer2.style.display = 'block';
  backBtn.style.display = 'block';
  document.body.classList.add('detail-active');

  gsap.to(flashOverlay, { opacity: 0, duration: 0.4 });
  window.scrollTo(0, 0);

  // Build masonry grid
  layer2.innerHTML = '';
  var wrap = document.createElement('div');
  wrap.className = 'masonry';

  var photos = PHOTOS[activeTheme] || PHOTOS.pet;
  photos.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'mphoto';
    if (p.img) {
      card.innerHTML = '<img class="ph" src="' + p.img + '" alt="" loading="lazy">';
    } else {
      card.innerHTML = '<div class="ph" style="height:' + (p.h || 280) + 'px;background:linear-gradient(135deg,' + p.c[0] + ',' + p.c[1] + ');border-radius:12px"></div>';
    }
    wrap.appendChild(card);
  });

  layer2.appendChild(wrap);

  // Staggered scroll-reveal entrance
  var items = wrap.querySelectorAll('.mphoto');
  items.forEach(function(el, i) {
    // Initial entrance: stagger from top
    gsap.to(el, {
      opacity: 1, y: 0, scale: 1,
      duration: 0.6,
      delay: 0.05 + i * 0.06,
      ease: 'power2.out',
      onStart: function() { el.classList.add('vis'); }
    });
  });
}

/* ====== TRANSITION: DETAIL → CARDS ====== */
function transitionToCards() {
  transitioning = true;
  currentLayer = 0;

  ScrollTrigger.getAll().forEach(function(st) { st.kill(); });

  // Fade out masonry
  gsap.to('#layer2 .mphoto', {
    opacity: 0, y: 30, scale: 0.95,
    stagger: 0.02, duration: 0.3, ease: 'power2.in',
    onComplete: function() {
      layer2.style.display = 'none';
      layer2.innerHTML = '';
      backBtn.style.display = 'none';
      document.body.classList.remove('detail-active');
      window.scrollTo(0, 0);

      layer1.style.display = 'flex';
      gsap.set(flashOverlay, { opacity: 0 });
      smoothMouseX = 0; smoothMouseY = 0;

      buildGallery();
      currentLayer = 1;
      galleryLoop();
      playGalleryEntrance();
      setTimeout(function() { transitioning = false; }, 2000);
    }
  });
}

backBtn.addEventListener('click', transitionToCards);

/* ====== RESIZE ====== */
window.addEventListener('resize', function() {
  isMobile = window.innerWidth < 768;
  galleryScale = isMobile ? 0.5 : 1;
});

/* ====== BG PARTICLES ====== */
(function(){
  var ct = document.getElementById('bgParticles');
  var cols = ['#7c3aed','#9f50d3','#f75092','#a78bfa','#f9a8d4','#c084fc','#8b5cf6'];
  for (var i = 0; i < 30; i++) {
    var d = document.createElement('div'); d.className = 'bg-dot';
    var s = 2 + Math.random() * 5, op = 0.08 + Math.random() * 0.18;
    d.style.cssText = 'width:'+s+'px;height:'+s+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;background:'+cols[i%cols.length]+';--dot-opacity:'+op+';animation-duration:'+(18+Math.random()*25)+'s;animation-delay:'+(-Math.random()*25)+'s;--dx:'+((Math.random()-0.5)*250)+'px;--dy:'+((Math.random()-0.5)*250)+'px;';
    ct.appendChild(d);
  }
})();

/* ====== INIT ====== */
buildGallery();
galleryLoop();
playGalleryEntrance();

})();
</script>
</body>
</html>
