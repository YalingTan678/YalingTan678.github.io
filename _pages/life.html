<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>Life | Lily Tan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;overflow-x:hidden;font-family:'Inter',system-ui,sans-serif;background:#faf8ff;color:#1e1b4b}
    body.layer2-active{overflow-y:auto}
    body:not(.layer2-active){overflow-y:hidden;height:100vh}
    ::-webkit-scrollbar{display:none}
    html{scrollbar-width:none}

    canvas#mainCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;display:none}

    .film-grain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9998;pointer-events:none;opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:128px 128px}

    /* ====== TOP NAV BAR ====== */
    .life-nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
      padding:0 2rem;height:54px;background:rgba(250,248,255,0.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(124,58,237,0.06)}
    .life-nav__logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#1e1b4b;text-decoration:none;letter-spacing:-0.01em}
    .life-nav__logo:hover{color:#7c3aed}
    .life-nav__links{display:flex;gap:1.6rem;list-style:none}
    .life-nav__links a{font-size:0.78rem;font-weight:500;color:rgba(30,27,75,0.5);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s}
    .life-nav__links a:hover,.life-nav__links a.active{color:#7c3aed}

    /* ====== BACKGROUND PARTICLES ====== */
    #bgParticles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
    .bg-dot{position:absolute;border-radius:50%;pointer-events:none;animation:floatDot linear infinite}
    @keyframes floatDot{
      0%{transform:translate(0,0) scale(1);opacity:0}
      8%{opacity:var(--dot-opacity,0.2)}
      88%{opacity:var(--dot-opacity,0.2)}
      100%{transform:translate(var(--dx),var(--dy)) scale(0.5);opacity:0}
    }

    /* ====== FLASH OVERLAY ====== */
    #flashOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:15;pointer-events:none;opacity:0}

    /* ====== LAYER 1: 3D Card Gallery ====== */
    #layer1{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;align-items:center;justify-content:center;overflow:hidden}

    #layer1 .title-text{position:absolute;top:70px;left:50%;transform:translateX(-50%);text-align:center;z-index:12;pointer-events:none}
    #layer1 .title-text h1{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,2.2vw,1.8rem);font-weight:400;color:rgba(30,27,75,0.5);letter-spacing:0.05em}
    #layer1 .title-text p{font-size:0.65rem;color:rgba(30,27,75,0.22);margin-top:0.25rem;letter-spacing:0.15em;text-transform:uppercase}

    /* Gallery 3D container */
    .gallery-wrap{width:100%;height:100%;perspective:1200px;perspective-origin:50% 50%}
    .gallery-stage{width:100%;height:100%;position:relative;transform-style:preserve-3d}

    /* Cards — glass/acrylic quality */
    .gcard{position:absolute;left:50%;top:50%;border-radius:12px;overflow:hidden;will-change:transform,opacity;backface-visibility:hidden;
      border:1px solid rgba(255,255,255,0.4);
      box-shadow:0 2px 8px rgba(30,27,75,0.08),0 25px 70px rgba(30,27,75,0.12);
      transition:box-shadow 0.45s ease,filter 0.45s ease}
    .gcard--main{cursor:pointer}
    .gcard--main.hovered{box-shadow:0 4px 12px rgba(124,58,237,0.15),0 40px 100px rgba(124,58,237,0.2),0 0 40px rgba(247,80,146,0.08)}
    .gcard--deco{pointer-events:none}
    .gcard__img{width:100%;height:100%;background-size:cover;background-position:center;position:absolute;top:0;left:0;filter:contrast(1.04) saturate(1.1)}
    /* Glass reflection overlay */
    .gcard::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 40%,transparent 60%,rgba(255,255,255,0.05) 100%);
      pointer-events:none;z-index:2}
    .gcard__overlay{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 1.2rem;z-index:3;
      background:linear-gradient(transparent 0%,rgba(0,0,0,0.55) 100%);display:flex;flex-direction:column;gap:0.25rem}
    .gcard__label{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.3);line-height:1.2}
    .gcard__explore{font-size:0.65rem;font-weight:500;color:rgba(255,255,255,0.6);letter-spacing:0.12em;text-transform:uppercase;
      opacity:0;transform:translateY(6px);transition:opacity 0.35s,transform 0.35s}
    .gcard--main.hovered .gcard__explore{opacity:1;transform:translateY(0)}

    /* ====== LAYER 2: Detail Page ====== */
    #layer2{display:none;position:relative;z-index:10;width:100%;height:600vh}

    .back-btn{position:fixed;top:2rem;left:2rem;z-index:100;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);
      color:rgba(30,27,75,0.6);padding:0.5rem 1.2rem;border-radius:30px;font-size:0.75rem;font-family:'Inter',sans-serif;
      letter-spacing:0.1em;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all 0.3s;display:none}
    .back-btn:hover{background:rgba(124,58,237,0.15);color:#1e1b4b}

    .panel{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:50;display:none;align-items:center;justify-content:center;
      pointer-events:none;opacity:0;transform:translateY(30px)}
    .panel.visible{display:flex}
    .panel-inner{max-width:600px;width:90%;padding:2rem;pointer-events:auto;background:rgba(250,248,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(124,58,237,0.1);box-shadow:0 8px 32px rgba(124,58,237,0.08)}
    .panel-number{font-size:0.7rem;letter-spacing:0.2em;color:rgba(124,58,237,0.35);margin-bottom:1rem;font-weight:300}
    .panel-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:400;line-height:1.2;
      color:#1e1b4b;margin-bottom:1rem;letter-spacing:-0.01em}
    .panel-text{font-size:0.9rem;font-weight:300;line-height:1.8;color:rgba(30,27,75,0.55);margin-bottom:1.5rem}
    .panel-photo{width:100%;height:200px;border:1px dashed rgba(124,58,237,0.2);border-radius:8px;display:flex;align-items:center;
      justify-content:center;color:rgba(124,58,237,0.3);font-size:0.75rem;letter-spacing:0.1em;background:rgba(124,58,237,0.03)}

    .dot-nav{position:fixed;right:2rem;top:50%;transform:translateY(-50%);z-index:100;display:none;flex-direction:column;gap:1rem}
    .dot-nav .dot{width:6px;height:6px;border-radius:50%;background:rgba(124,58,237,0.2);cursor:pointer;transition:all 0.3s;position:relative}
    .dot-nav .dot.active{background:rgba(124,58,237,0.8);transform:scale(1.5)}
    .dot-nav .dot::after{content:attr(data-label);position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:0.6rem;
      letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;opacity:0;transition:opacity 0.3s;color:rgba(30,27,75,0.5)}
    .dot-nav .dot:hover::after{opacity:1}

    .progress-bar{position:fixed;top:0;left:0;height:2px;z-index:200;background:linear-gradient(90deg,#7c3aed,#f75092);width:0%;
      pointer-events:none;display:none}

    .section-counter{position:fixed;right:2rem;bottom:2rem;z-index:100;font-size:0.7rem;letter-spacing:0.15em;
      color:rgba(30,27,75,0.2);pointer-events:none;display:none}
    .section-counter span{color:rgba(124,58,237,0.6);font-weight:600;font-size:0.9rem}

    .panel-cta{display:inline-block;padding:0.6rem 1.8rem;border-radius:30px;font-size:0.75rem;font-weight:500;letter-spacing:0.1em;
      cursor:pointer;color:#fff;background:linear-gradient(135deg,#7c3aed,#f75092);border:none;font-family:'Inter',sans-serif;
      transition:all 0.3s;pointer-events:auto}
    .panel-cta:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,0.4)}

    @media(max-width:768px){
      .life-nav{padding:0 1rem;height:48px}
      .life-nav__links{gap:1rem}
      .life-nav__links a{font-size:0.7rem}
      .dot-nav{right:0.8rem}
      .section-counter{right:1rem;bottom:1rem}
      .back-btn{top:1rem;left:1rem;padding:0.4rem 0.8rem;font-size:0.65rem}
      .panel-inner{padding:1.5rem}
      .gallery-wrap{perspective:800px}
      #layer1 .title-text{top:58px}
    }
  </style>
</head>

<script>
(function(){

/* ====== THEMES (detail panels) ====== */
var THEMES = {
  pet: {
    panels: [
      { title: "A Life with Paws", text: "Some of the purest joys in life come from the companionship of animals. They teach patience, unconditional love, and the art of living in the present moment." },
      { title: "My Furry Family", text: "Every pet has a personality as unique as any person. They greet you at the door, curl up beside you while you work, and remind you that the simplest pleasures are the deepest.", photo: true },
      { title: "Daily Joy", text: "Morning walks, afternoon naps in sunbeams, evening play sessions. The rhythm of life with pets is a gentle, grounding cadence that keeps everything in perspective." },
      { title: "Grooming Love", text: "There is something meditative about caring for another living being. Brushing fur, trimming nails, preparing their favorite meals \u2014 these small acts of care are acts of love.", photo: true },
      { title: "Captured Moments", text: "Every photo tells a story. A mid-yawn portrait, a blurry action shot of zoomies, a peaceful sleeping pose. These are the moments worth preserving.", photo: true },
      { title: "Back to Cards", text: "Thank you for sharing this journey through my life with paws. There is always more to discover." }
    ]
  },
  florist: {
    panels: [
      { title: "Bloom & Craft", text: "Flowers speak a language older than words. Arranging them is my way of creating small moments of beauty in an otherwise busy world." },
      { title: "My Arrangements", text: "Each bouquet begins with intuition \u2014 a color that calls, a texture that intrigues. The arrangement grows organically, guided by an eye for balance and harmony.", photo: true },
      { title: "The Creative Process", text: "Selecting stems at the market, conditioning flowers in water, experimenting with vase shapes. The process is as rewarding as the final result." },
      { title: "Styles & Seasons", text: "Spring pastels, summer wildflowers, autumn warmth, winter minimalism. Each season brings its own palette and mood, and I love adapting to nature's rhythm.", photo: true },
      { title: "Gallery", text: "A curated collection of arrangements \u2014 from everyday table settings to special occasion centerpieces. Each one is a unique expression.", photo: true },
      { title: "Back to Cards", text: "Thank you for wandering through my floral world. Every bloom has a story." }
    ]
  },
  travel: {
    panels: [
      { title: "Wander & Wonder", text: "Travel is not just about the places you visit, but the perspectives you gain. Every journey reshapes the way I see the world and my place in it." },
      { title: "Places I've Been", text: "From bustling cities to quiet countryside, each destination leaves its mark. The architecture, the food, the light at golden hour \u2014 these details stay with me.", photo: true },
      { title: "Favorite Memories", text: "A spontaneous conversation with a stranger in a caf\u00e9. Getting lost in a neighborhood and finding the best meal of the trip. These unplanned moments are the ones I treasure most." },
      { title: "People Along the Way", text: "Travel connects you with people whose lives are beautifully different from your own. These brief encounters leave lasting impressions and broaden understanding.", photo: true },
      { title: "Postcards", text: "Snapshots from the road \u2014 sunsets, street scenes, market stalls, mountain vistas. Each image is a postcard from a moment in time.", photo: true },
      { title: "Back to Cards", text: "Thank you for traveling with me. The journey never truly ends." }
    ]
  }
};

/* ====== GALLERY CARDS — 3 main cards only, diagonal cascade ====== */
var CARD_RY = -25, CARD_RX = 8;
var CARD_W = 280, CARD_H = 380;
var ALL_CARDS = [
  { type:'main', key:'pet',     label:'Pet Lover', img:'/images/life/pet.jpg',     x:-200, y:120, z:80,   ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H },
  { type:'main', key:'florist', label:'Florist',   img:'/images/life/florist.jpg', x:60,   y:0,   z:-60,  ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H },
  { type:'main', key:'travel',  label:'Travel',    img:'/images/life/travel.jpg',  x:320,  y:-120, z:-200, ry:CARD_RY, rx:CARD_RX, w:CARD_W, h:CARD_H }
];

/* ====== GLOBALS ====== */
var canvas = document.getElementById('mainCanvas');
var layer1 = document.getElementById('layer1');
var layer2 = document.getElementById('layer2');
var backBtn = document.getElementById('backBtn');
var progressBar = document.getElementById('progressBar');
var dotNav = document.getElementById('dotNav');
var sectionCounter = document.getElementById('sectionCounter');
var secNum = document.getElementById('secNum');
var panelCta = document.getElementById('panelCta');
var galleryStage = document.getElementById('galleryStage');
var flashOverlay = document.getElementById('flashOverlay');

var renderer, camera, currentScene;
var currentLayer = 1;
var animId, galleryAnimId;
var activeTheme = null;
var transitioning = false;

var cardElements = [];
var mainCardElements = [];

var targetMouseX = 0, targetMouseY = 0;
var smoothMouseX = 0, smoothMouseY = 0;

var isMobile = window.innerWidth < 768;
var galleryScale = isMobile ? 0.5 : 1;

/* ====== THREE.JS RENDERER (detail scene only) ====== */
renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xfaf8ff, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

/* ====== BUILD GALLERY ====== */
function buildGallery() {
  galleryStage.innerHTML = '';
  cardElements = [];
  mainCardElements = [];

  ALL_CARDS.forEach(function(d, i) {
    var card = document.createElement('div');
    card.className = 'gcard' + (d.type === 'main' ? ' gcard--main' : ' gcard--deco');
    card.dataset.z = d.z;
    card.dataset.idx = i;
    card.style.width = (d.w * galleryScale) + 'px';
    card.style.height = (d.h * galleryScale) + 'px';

    if (d.type === 'main') {
      card.dataset.key = d.key;
      var imgDiv = document.createElement('div');
      imgDiv.className = 'gcard__img';
      imgDiv.style.backgroundImage = "url('" + d.img + "')";
      card.appendChild(imgDiv);

      var overlay = document.createElement('div');
      overlay.className = 'gcard__overlay';
      overlay.innerHTML = '<span class="gcard__label">' + d.label + '</span><span class="gcard__explore">Explore \u2192</span>';
      card.appendChild(overlay);

      (function(el, data) {
        el.addEventListener('click', function() {
          if (transitioning || currentLayer !== 1) return;
          transitionToDetail(el);
        });
        // Cinema Focus hover: others blur+shrink, this card sharpens+grows
        el.addEventListener('mouseenter', function() {
          if (transitioning) return;
          el.classList.add('hovered');
          gsap.to(el, { scale: 1.06, z: data.z + 60, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
          cardElements.forEach(function(c) {
            if (c !== el) gsap.to(c, { filter: 'blur(4px)', scale: 0.92, opacity: 0.5, duration: 0.4, overwrite: 'auto' });
          });
        });
        el.addEventListener('mouseleave', function() {
          el.classList.remove('hovered');
          gsap.to(el, { scale: 1, z: data.z, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
          cardElements.forEach(function(c) {
            if (c !== el) {
              var cd = ALL_CARDS[parseInt(c.dataset.idx)];
              gsap.to(c, { filter: 'none', scale: 1, opacity: 1, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });
            }
          });
        });
      })(card, d);

      mainCardElements.push(card);
    } else {
      var imgDiv = document.createElement('div');
      imgDiv.className = 'gcard__img';
      imgDiv.style.background = d.bg;
      card.appendChild(imgDiv);
    }

    // Initial position (hidden for entrance animation)
    gsap.set(card, {
      xPercent: -50,
      yPercent: -50,
      x: d.x * galleryScale,
      y: d.y * galleryScale,
      z: d.z,
      rotateX: d.rx,
      rotateY: d.ry,
      opacity: 0,
      scale: 0.5
    });

    galleryStage.appendChild(card);
    cardElements.push(card);
  });
}

/* ====== ZOOM BURST ENTRANCE ====== */
function playGalleryEntrance() {
  var titleText = layer1.querySelector('.title-text');
  gsap.set(titleText, { opacity: 0, y: 15 });

  // All cards start stacked at center, tiny and invisible
  cardElements.forEach(function(c) {
    gsap.set(c, { x: 0, y: 0, z: 0, scale: 0.1, opacity: 0 });
  });

  var tl = gsap.timeline();

  // Cards burst outward to their final diagonal positions
  cardElements.forEach(function(c, i) {
    var d = ALL_CARDS[parseInt(c.dataset.idx)];
    tl.to(c, {
      x: d.x * galleryScale,
      y: d.y * galleryScale,
      z: d.z,
      scale: 1,
      opacity: 1,
      duration: 0.9,
      ease: 'back.out(1.3)'
    }, 0.3 + i * 0.06);
  });

  // Title fades in after cards settle
  tl.to(titleText, { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out' }, 1.2);
}

/* ====== MOUSE PARALLAX ====== */
window.addEventListener('mousemove', function(e) {
  targetMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  targetMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function galleryLoop() {
  galleryAnimId = requestAnimationFrame(galleryLoop);
  if (currentLayer !== 1) return;

  if (!transitioning) {
    smoothMouseX += (targetMouseX - smoothMouseX) * 0.04;
    smoothMouseY += (targetMouseY - smoothMouseY) * 0.04;

    galleryStage.style.transform =
      'rotateY(' + (smoothMouseX * 2) + 'deg) ' +
      'rotateX(' + (-smoothMouseY * 1.5) + 'deg)';
  }
}

/* ====== TRANSITION: GALLERY -> DETAIL ("pull out card") ====== */
function transitionToDetail(mainCardEl) {
  transitioning = true;
  activeTheme = mainCardEl.dataset.key;
  populatePanels(activeTheme);

  gsap.killTweensOf('.gcard');

  var tl = gsap.timeline({
    onComplete: function() {
      showDetailLayer();
      transitioning = false;
    }
  });

  // Fade title
  tl.to('#layer1 .title-text', { opacity: 0, y: -15, duration: 0.3, ease: 'power2.in' }, 0);

  // Other cards: retreat backward + blur + fade
  cardElements.forEach(function(c) {
    if (c === mainCardEl) return;
    tl.to(c, {
      z: '-=400',
      opacity: 0,
      filter: 'blur(8px)',
      duration: 0.8,
      ease: 'power2.in'
    }, 0);
  });

  // Reset stage rotation smoothly
  tl.to(galleryStage, { rotateY: 0, rotateX: 0, duration: 0.5, ease: 'power2.out', overwrite: 'auto' }, 0);

  // Clicked card: pull forward out of the stack
  tl.to(mainCardEl, { z: '+=200', duration: 0.25, ease: 'power2.out' }, 0);

  // Flatten rotation and center
  tl.to(mainCardEl, {
    x: 0, y: 0, z: 500,
    rotateX: 0, rotateY: 0, rotation: 0,
    duration: 0.7,
    ease: 'power2.inOut'
  }, 0.2);

  // Scale to fill viewport
  var rect = mainCardEl.getBoundingClientRect();
  var scaleToFill = Math.max(window.innerWidth / Math.max(rect.width, 1), window.innerHeight / Math.max(rect.height, 1)) * 1.3;
  tl.to(mainCardEl, { scale: scaleToFill, duration: 0.45, ease: 'power2.in' }, 0.7);

  // Fade out
  tl.to(mainCardEl, { opacity: 0, duration: 0.2 }, 1.0);

  // White flash
  tl.to(flashOverlay, { opacity: 1, duration: 0.25, ease: 'power1.in' }, 0.95);
}

function populatePanels(themeKey) {
  var panels = THEMES[themeKey].panels;
  for (var i = 0; i < 6; i++) {
    document.getElementById('pt' + i).textContent = panels[i].title;
    document.getElementById('px' + i).textContent = panels[i].text;
  }
}

/* ====== SHOW DETAIL LAYER ====== */
function showDetailLayer() {
  currentLayer = 2;
  cancelAnimationFrame(galleryAnimId);

  layer1.style.display = 'none';
  document.querySelector('.life-nav').style.display = 'none';
  canvas.style.display = 'block';
  layer2.style.display = 'block';
  backBtn.style.display = 'block';
  progressBar.style.display = 'block';
  dotNav.style.display = 'flex';
  sectionCounter.style.display = 'block';
  document.body.classList.add('layer2-active');

  gsap.to(flashOverlay, { opacity: 0, duration: 0.4 });

  window.scrollTo(0, 0);

  dotNav.innerHTML = '';
  var panelData = THEMES[activeTheme].panels;
  for (var i = 0; i < 6; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('data-label', panelData[i].title);
    dot.setAttribute('data-idx', i);
    dot.addEventListener('click', (function(idx) {
      return function() {
        var targetScroll = (idx / 6) * (document.documentElement.scrollHeight - window.innerHeight);
        window.scrollTo({ top: targetScroll, behavior: 'smooth' });
      };
    })(i));
    dotNav.appendChild(dot);
  }

  renderer.setClearColor(0xfaf8ff, 1);
  renderer.setSize(window.innerWidth, window.innerHeight);

  initDetailScene();
  renderDetailScene();
}

/* ====== DETAIL SCENE (Three.js — preserved exactly) ====== */
var detailScene, detailCamera, detailClock;
var cameraPath, lookAtPath;
var detailParticles;
var detailStreams = [];
var prevDetailProgress = 0;

function smoothNoise(x,y,z){
  return Math.sin(x*1.1+y*0.7)*0.5+Math.sin(y*1.3+z*0.9)*0.3+Math.sin(z*0.8+x*1.5)*0.2;
}

function initDetailScene() {
  detailScene = new THREE.Scene();
  detailScene.fog = new THREE.FogExp2(0xfaf8ff, 0.04);

  detailCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);

  detailScene.add(new THREE.AmbientLight(0xffffff, 0.6));
  var dl = new THREE.DirectionalLight(0x7c3aed, 0.5);
  dl.position.set(5, 10, 5);
  detailScene.add(dl);
  var dl2 = new THREE.DirectionalLight(0xf75092, 0.4);
  dl2.position.set(-5, -5, -10);
  detailScene.add(dl2);

  cameraPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0, 12),
    new THREE.Vector3(3, 1, 8),
    new THREE.Vector3(-2, 2, 4),
    new THREE.Vector3(4, -1, 0),
    new THREE.Vector3(-3, 0, -4),
    new THREE.Vector3(0, 3, -8),
    new THREE.Vector3(2, -1, -12),
    new THREE.Vector3(0, 0, -16)
  ]);

  lookAtPath = new THREE.CatmullRomCurve3([
    new THREE.Vector3(1, 0.5, 8),
    new THREE.Vector3(-1, 1.5, 5),
    new THREE.Vector3(2, 1, 1),
    new THREE.Vector3(-2, 0, -3),
    new THREE.Vector3(1, 1, -7),
    new THREE.Vector3(-1, 2, -11),
    new THREE.Vector3(0, 0.5, -15),
    new THREE.Vector3(1, 0, -20)
  ]);

  var wireGeos = [
    new THREE.IcosahedronGeometry(0.5, 0),
    new THREE.OctahedronGeometry(0.5, 0),
    new THREE.TetrahedronGeometry(0.5, 0),
    new THREE.BoxGeometry(0.7, 0.7, 0.7)
  ];
  for (var i = 0; i < 40; i++) {
    var t = i / 40;
    var pt = cameraPath.getPointAt(t);
    var geo = wireGeos[i % wireGeos.length];
    var mat = new THREE.MeshPhongMaterial({ color: i % 2 === 0 ? 0x7c3aed : 0xf75092, wireframe: true, transparent: true, opacity: 0.25 });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pt.x + (Math.random() - 0.5) * 8, pt.y + (Math.random() - 0.5) * 6, pt.z + (Math.random() - 0.5) * 4);
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    mesh.userData.rotSpeed = { x: (Math.random() - 0.5) * 0.01, y: (Math.random() - 0.5) * 0.01 };
    detailScene.add(mesh);
  }

  for (var i = 0; i < 60; i++) {
    var t = i / 60;
    var pt = cameraPath.getPointAt(t);
    var geo = new THREE.SphereGeometry(0.08 + Math.random() * 0.12, 8, 8);
    var mat = new THREE.MeshPhongMaterial({ color: 0x9f50d3, shininess: 100, transparent: true, opacity: 0.35 });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pt.x + (Math.random() - 0.5) * 10, pt.y + (Math.random() - 0.5) * 8, pt.z + (Math.random() - 0.5) * 6);
    detailScene.add(mesh);
  }

  var pGeo = new THREE.BufferGeometry();
  var pPos = new Float32Array(600 * 3);
  for (var i = 0; i < 600; i++) {
    var t = Math.random();
    var pt = cameraPath.getPointAt(t);
    pPos[i * 3] = pt.x + (Math.random() - 0.5) * 12;
    pPos[i * 3 + 1] = pt.y + (Math.random() - 0.5) * 10;
    pPos[i * 3 + 2] = pt.z + (Math.random() - 0.5) * 8;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  detailParticles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.04, transparent: true, opacity: 0.4, sizeAttenuation: true }));
  detailScene.add(detailParticles);

  var streamCurves = [
    new THREE.CatmullRomCurve3([new THREE.Vector3(-6,3,14),new THREE.Vector3(-2,5,8),new THREE.Vector3(3,1,3),new THREE.Vector3(-1,-2,-2),new THREE.Vector3(4,2,-7),new THREE.Vector3(-3,4,-12),new THREE.Vector3(2,0,-17)], false, 'catmullrom', 0.3),
    new THREE.CatmullRomCurve3([new THREE.Vector3(5,-2,13),new THREE.Vector3(1,3,7),new THREE.Vector3(-4,0,2),new THREE.Vector3(2,-3,-3),new THREE.Vector3(-2,1,-8),new THREE.Vector3(5,-1,-13),new THREE.Vector3(-1,3,-18)], false, 'catmullrom', 0.3),
    new THREE.CatmullRomCurve3([new THREE.Vector3(-3,-4,15),new THREE.Vector3(4,1,9),new THREE.Vector3(-1,4,4),new THREE.Vector3(3,-1,-1),new THREE.Vector3(-4,-2,-6),new THREE.Vector3(1,3,-11),new THREE.Vector3(-2,-1,-16)], false, 'catmullrom', 0.3),
    new THREE.CatmullRomCurve3([new THREE.Vector3(2,5,12),new THREE.Vector3(-3,-1,6),new THREE.Vector3(5,2,1),new THREE.Vector3(-2,4,-4),new THREE.Vector3(3,-3,-9),new THREE.Vector3(-4,0,-14),new THREE.Vector3(0,2,-19)], false, 'catmullrom', 0.3)
  ];

  var STREAM_COUNT = 400;
  detailStreams = [];

  streamCurves.forEach(function(curve, si){
    var geo = new THREE.BufferGeometry();
    var pos = new Float32Array(STREAM_COUNT * 3);
    var pData = [];
    for(var i = 0; i < STREAM_COUNT; i++){
      var t = Math.random();
      var pt = curve.getPointAt(t);
      pos[i*3] = pt.x; pos[i*3+1] = pt.y; pos[i*3+2] = pt.z;
      pData.push({ t: t, speed: 0.003 + Math.random() * 0.006, spreadR: 0.05 + Math.random() * 0.4, spreadAngle: Math.random() * Math.PI * 2, noiseOff: Math.random() * 100 });
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    var streamColors = [0x7c3aed, 0xf75092, 0x9f50d3, 0xa78bfa];
    var pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: streamColors[si], size: 0.15, transparent: true, opacity: 0.8, sizeAttenuation: true }));
    detailScene.add(pts);
    detailStreams.push({ points:pts, geo:geo, curve:curve, data:pData });
  });

  detailClock = new THREE.Clock();
  currentScene = detailScene;
  camera = detailCamera;

  gsap.registerPlugin(ScrollTrigger);
  ScrollTrigger.getAll().forEach(function(st) { st.kill(); });
  ScrollTrigger.create({
    trigger: layer2,
    start: 'top top',
    end: 'bottom bottom',
    scrub: 0.8,
    onUpdate: function(self) { detailProgress = self.progress; }
  });
}

var detailProgress = 0;

function renderDetailScene() {
  if (currentLayer !== 2) return;
  animId = requestAnimationFrame(renderDetailScene);

  var el = detailClock.getElapsedTime();
  var prog = Math.max(0, Math.min(detailProgress, 0.999));

  var camPos = cameraPath.getPointAt(prog);
  var lookPos = lookAtPath.getPointAt(Math.min(prog + 0.05, 0.999));
  detailCamera.position.copy(camPos);
  detailCamera.lookAt(lookPos);

  detailScene.fog.density = 0.04 + prog * 0.02;
  renderer.toneMappingExposure = 1.0 + Math.sin(prog * Math.PI) * 0.3;

  detailScene.children.forEach(function(child) {
    if (child.userData.rotSpeed) {
      child.rotation.x += child.userData.rotSpeed.x;
      child.rotation.y += child.userData.rotSpeed.y;
    }
  });

  if (detailParticles) detailParticles.rotation.y = el * 0.005;

  var scrollSpeed = Math.abs(prog - prevDetailProgress) * 60;
  prevDetailProgress = prog;
  var speedBoost = 1 + scrollSpeed * 80;

  for (var si = 0; si < detailStreams.length; si++) {
    var stream = detailStreams[si];
    var positions = stream.geo.attributes.position.array;
    var curve = stream.curve;
    var densityFade = prog < 0.15 ? prog / 0.15 : (prog > 0.85 ? (1 - prog) / 0.15 : 1);
    stream.points.material.opacity = 0.55 * densityFade;

    for (var pi = 0; pi < 400; pi++) {
      var pd = stream.data[pi];
      pd.t += pd.speed * speedBoost * 0.016;
      if (pd.t > 1) pd.t -= 1;
      var t = pd.t;
      var pt = curve.getPointAt(t);
      var tangent = curve.getTangentAt(t);
      var perpX = -tangent.y, perpY = tangent.x;
      var n1 = smoothNoise(t*5+pd.noiseOff, el*0.3+si, si*7);
      var dSpread = pd.spreadR * (0.7 + n1*0.5);
      positions[pi*3]   = pt.x + perpX*dSpread*Math.cos(pd.spreadAngle+el*0.15+n1*0.4);
      positions[pi*3+1] = pt.y + perpY*dSpread*Math.sin(pd.spreadAngle+el*0.12);
      positions[pi*3+2] = pt.z + Math.sin(t*6+el*0.2+pd.noiseOff)*0.12*pd.spreadR;
    }
    stream.geo.attributes.position.needsUpdate = true;
  }

  var sectionSize = 1 / 6;
  var currentIdx = Math.min(Math.floor(prog / sectionSize), 5);
  var localT = (prog - currentIdx * sectionSize) / sectionSize;

  for (var i = 0; i < 6; i++) {
    var panel = document.getElementById('panel' + i);
    if (i === currentIdx) {
      panel.classList.add('visible');
      var opacity, ty;
      if (localT < 0.15) { opacity = localT / 0.15; ty = 30 * (1 - localT / 0.15); }
      else if (localT > 0.85) { opacity = (1 - localT) / 0.15; ty = -30 * (1 - (1 - localT) / 0.15); }
      else { opacity = 1; ty = 0; }
      panel.style.opacity = Math.max(0, Math.min(1, opacity));
      panel.style.transform = 'translateY(' + ty + 'px)';
    } else {
      panel.classList.remove('visible');
      panel.style.opacity = 0;
    }
  }

  secNum.textContent = ('0' + (currentIdx + 1)).slice(-2);
  progressBar.style.width = (prog * 100) + '%';
  var dots = dotNav.querySelectorAll('.dot');
  dots.forEach(function(d, i) { d.classList.toggle('active', i === currentIdx); });

  renderer.render(detailScene, detailCamera);
}

/* ====== TRANSITION: DETAIL -> CARDS ====== */
function transitionToCards() {
  transitioning = true;
  currentLayer = 0;
  cancelAnimationFrame(animId);

  ScrollTrigger.getAll().forEach(function(st) { st.kill(); });

  layer2.style.display = 'none';
  canvas.style.display = 'none';
  backBtn.style.display = 'none';
  progressBar.style.display = 'none';
  dotNav.style.display = 'none';
  sectionCounter.style.display = 'none';
  document.body.classList.remove('layer2-active');

  for (var i = 0; i < 6; i++) {
    var panel = document.getElementById('panel' + i);
    panel.classList.remove('visible');
    panel.style.opacity = 0;
  }

  window.scrollTo(0, 0);

  layer1.style.display = 'flex';
  document.querySelector('.life-nav').style.display = 'flex';
  gsap.set(flashOverlay, { opacity: 0 });

  smoothMouseX = 0;
  smoothMouseY = 0;

  buildGallery();
  currentLayer = 1;
  galleryLoop();
  playGalleryEntrance();

  setTimeout(function() { transitioning = false; }, 2500);
}

backBtn.addEventListener('click', transitionToCards);
panelCta.addEventListener('click', transitionToCards);

/* ====== RESIZE ====== */
window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  isMobile = window.innerWidth < 768;
  galleryScale = isMobile ? 0.5 : 1;
  if (currentLayer === 2 && detailCamera) {
    detailCamera.aspect = window.innerWidth / window.innerHeight;
    detailCamera.updateProjectionMatrix();
  }
});

/* ====== BACKGROUND PARTICLES ====== */
function createBgParticles() {
  var container = document.getElementById('bgParticles');
  var colors = ['#7c3aed','#9f50d3','#f75092','#a78bfa','#f9a8d4','#c084fc','#8b5cf6'];
  for (var i = 0; i < 30; i++) {
    var dot = document.createElement('div');
    dot.className = 'bg-dot';
    var size = 2 + Math.random() * 5;
    var op = 0.08 + Math.random() * 0.18;
    dot.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + (Math.random() * 100) + '%;' +
      'top:' + (Math.random() * 100) + '%;' +
      'background:' + colors[i % colors.length] + ';' +
      '--dot-opacity:' + op + ';' +
      'animation-duration:' + (18 + Math.random() * 25) + 's;' +
      'animation-delay:' + (-Math.random() * 25) + 's;' +
      '--dx:' + ((Math.random() - 0.5) * 250) + 'px;' +
      '--dy:' + ((Math.random() - 0.5) * 250) + 'px;';
    container.appendChild(dot);
  }
}

/* ====== INIT ====== */
createBgParticles();
buildGallery();
galleryLoop();
playGalleryEntrance();

})();
</script>
